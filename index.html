<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Siddh Kala Alankar | Handcrafted Maharashtrian Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --ivory: #FCFBF4; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--ivory); color: #2d2d2d; }
        h1, h2, h3, .brand-font { font-family: 'Cinzel', serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F1D592 50%, #996515 100%); }
        .nav-link { cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; transition: 0.3s; }
        .nav-link:hover, .active-tab { color: var(--gold); border-bottom: 1px solid var(--gold); }
        .hidden-section { display: none; }
        .product-card { transition: 0.4s; border: 1px solid transparent; background: white; }
        .product-card:hover { border-color: var(--gold); transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-xl font-bold tracking-[0.2em] text-[#D4AF37]">SHREE SIDDH KALA ALANKAR</h1>
                <p class="text-[8px] uppercase tracking-[0.4em] text-gray-400">Handcrafted Maharashtrian Elegance</p>
            </div>
            <div class="flex space-x-8">
                <span onclick="showPage('home')" id="link-home" class="nav-link active-tab">Home</span>
                <span onclick="showPage('collection')" id="link-collection" class="nav-link">Collection</span>
                <span onclick="showPage('admin')" id="link-admin" class="nav-link text-gray-400">Admin</span>
            </div>
        </div>
    </nav>

    <section id="page-home" class="content-section">
        <div class="relative h-[80vh] flex items-center justify-center overflow-hidden">
            <img src="https://images.unsplash.com/photo-1621425442003-d6676356064d?auto=format&fit=crop&q=80" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/50"></div>
            <div class="relative z-10 text-center text-white px-6">
                <h2 class="text-5xl md:text-7xl mb-4 font-light">The Golden Heritage</h2>
                <p class="text-lg md:text-xl tracking-widest font-light mb-8">Authentic Maharashtrian Jewelry from Nashik</p>
                <button onclick="showPage('collection')" class="px-12 py-4 border border-white hover:bg-white hover:text-black transition-all uppercase tracking-widest text-xs">View Collection</button>
            </div>
        </div>
    </section>

    <section id="page-collection" class="content-section hidden-section py-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl mb-2 gold-text">Our Masterpieces</h2>
            <div class="w-24 h-[1px] bg-[#D4AF37] mx-auto mb-4"></div>
        </div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </section>

    <section id="page-admin" class="content-section hidden-section py-20 px-6">
        <div class="max-w-xl mx-auto bg-white p-10 shadow-2xl rounded-lg">
            <h2 class="text-2xl mb-8 text-center gold-text">Admin Panel</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="Jewelry Name" class="w-full p-4 border rounded focus:ring-1 focus:ring-gold-500">
                <input type="number" id="pPrice" placeholder="Price (₹)" class="w-full p-4 border rounded">
                <textarea id="pDesc" placeholder="Product Description..." class="w-full p-4 border rounded h-24"></textarea>
                <div class="border p-4 rounded bg-gray-50">
                    <p class="text-xs text-gray-500 mb-2 font-bold">Upload Photo (Keep under 1MB for speed)</p>
                    <input type="file" id="pImage" accept="image/*" class="text-xs">
                </div>
                <button onclick="uploadToFirebase()" id="uploadBtn" class="w-full gold-gradient text-white py-4 font-bold tracking-widest rounded hover:opacity-90">SAVE TO CLOUD</button>
            </div>
        </div>
    </section>

    <div id="productModal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4">
        <div class="bg-white max-w-5xl w-full flex flex-col md:flex-row overflow-hidden rounded-sm relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-3xl hover:text-[#D4AF37]">&times;</button>
            <div class="md:w-1/2 bg-gray-50 h-[300px] md:h-auto">
                <img id="modalImg" src="" class="w-full h-full object-contain p-4">
            </div>
            <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                <h2 id="modalName" class="text-3xl mb-2 brand-font"></h2>
                <p id="modalPrice" class="text-2xl text-[#D4AF37] mb-6"></p>
                <div class="w-12 h-[1px] bg-gray-300 mb-6"></div>
                <p id="modalDesc" class="text-gray-500 leading-relaxed mb-8 font-light"></p>
                <button id="whatsappBtn" class="w-full bg-[#25D366] text-white py-4 rounded-full font-bold flex items-center justify-center gap-3 hover:scale-105 transition-transform">
                    Inquire on WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyAf9oBIC7SlWFR2467xHBh3iQ2Mdejua-8",
          authDomain: "shreesiddhkala-d393c.firebaseapp.com",
          projectId: "shreesiddhkala-d393c",
          storageBucket: "shreesiddhkala-d393c.firebasestorage.app",
          messagingSenderId: "453855024328",
          appId: "1:453855024328:web:d5ab9bae2de6c8a7fe01fd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showPage(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden-section'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-tab'));
            document.getElementById('page-'+id).classList.remove('hidden-section');
            document.getElementById('link-'+id).classList.add('active-tab');
            window.scrollTo(0,0);
        }

        function uploadToFirebase() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const file = document.getElementById('pImage').files[0];
            const btn = document.getElementById('uploadBtn');

            if(!name || !price || !file) return alert("Please fill all details and pick a photo.");

            btn.innerText = "SAVING...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file); // Converts image to text for Option B
            reader.onload = async function() {
                try {
                    const imageData = reader.result;
                    await db.collection('products').add({
                        name, price, desc, image: imageData, createdAt: Date.now()
                    });
                    alert("Jewelry added successfully!");
                    location.reload();
                } catch (e) {
                    alert("Error: " + e.message);
                    btn.innerText = "SAVE TO CLOUD";
                    btn.disabled = false;
                }
            };
        }

        function renderProducts() {
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const grid = document.getElementById('productGrid');
                if(snap.empty) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400">Your collection is empty. Add items from Admin.</p>';
                    return;
                }
                grid.innerHTML = snap.docs.map(doc => {
                    const p = doc.data();
                    return `
                        <div class="product-card p-4 cursor-pointer" onclick="openModal('${doc.id}', '${p.name}', '${p.price}', \`${p.desc}\`, '${p.image}')">
                            <div class="h-64 overflow-hidden mb-4 bg-gray-50">
                                <img src="${p.image}" class="w-full h-full object-cover">
                            </div>
                            <h4 class="brand-font text-lg text-center font-bold">${p.name}</h4>
                            <p class="text-center text-[#D4AF37]">₹${p.price}</p>
                            <button onclick="event.stopPropagation(); deleteProduct('${doc.id}')" class="w-full mt-4 text-[9px] uppercase text-red-300 hover:text-red-500 tracking-tighter">Remove</button>
                        </div>
                    `;
                }).join('');
            });
        }

        async function deleteProduct(id) {
            if(confirm("Delete this piece from catalog?")) {
                await db.collection('products').doc(id).delete();
            }
        }

        function openModal(id, name, price, desc, img) {
            document.getElementById('modalImg').src = img;
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalPrice').innerText = '₹' + price;
            document.getElementById('modalDesc').innerText = desc;
            
            const msg = encodeURIComponent(`Namaste Shree Siddh Kala Alankar! \n\nI am interested in this piece: \n*Item:* ${name}\n*Price:* ₹${price}\n\nCan you tell me more?`);
            document.getElementById('whatsappBtn').onclick = () => {
                window.open(`https://wa.me/918208059509?text=${msg}`, '_blank');
            };

            document.getElementById('productModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        renderProducts();
    </script>
</body>
</html>
